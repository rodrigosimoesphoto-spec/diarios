<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
<title>Diário de Frequência — Professor | Marista</title>
<link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@400;500;600;700&display=swap" rel="stylesheet">
<style>
*{box-sizing:border-box;margin:0;padding:0;font-family:'Montserrat',sans-serif}
:root{--azul:#002B7F;--azul-h:#001F5C;--azul-l:#E8EDF8;--azul-m:#4A6BBF;--red:#E31837;--red-l:#FDEAED;--white:#fff;--gray:#F4F5F8;--border:#C8D0E8;--text:#1A1A2E;--muted:#5A6480}
body{background:var(--gray);padding:10px;min-height:100vh}
.app{max-width:480px;margin:0 auto}
select{width:100%;margin-bottom:8px;font-size:13px;font-family:'Montserrat',sans-serif;padding:9px 12px;border:1.5px solid var(--border);border-radius:8px;background:var(--white);color:var(--text);font-weight:500;outline:none}
select:focus{border-color:var(--azul)}
.brand-bar{background:var(--azul);border-radius:10px;padding:12px 16px;margin-bottom:12px;display:flex;align-items:center;gap:12px}
.brand-logo{width:38px;height:38px;border-radius:50%;background:white;display:flex;align-items:center;justify-content:center;font-weight:700;font-size:14px;color:var(--azul);flex-shrink:0}
.brand-title{color:white;font-size:14px;font-weight:700;letter-spacing:.3px}
.brand-sub{color:rgba(255,255,255,.65);font-size:10px;font-weight:500;margin-top:1px;text-transform:uppercase;letter-spacing:.5px}
.sync-badge{margin-left:auto;background:rgba(255,255,255,.15);color:white;font-size:9px;font-weight:700;padding:3px 8px;border-radius:5px;text-transform:uppercase;letter-spacing:.4px}
.turma-header{border:1.5px solid var(--azul);border-radius:10px;overflow:hidden;margin-bottom:10px}
.th-top{background:var(--azul);padding:12px 14px}
.th-nome{font-size:14px;font-weight:700;color:white;letter-spacing:.2px}
.th-meta{font-size:10px;color:rgba(255,255,255,.75);margin-top:3px;font-weight:500;letter-spacing:.3px}
.th-stats{display:grid;grid-template-columns:1fr 1fr 1fr;background:var(--white)}
.th-stat{text-align:center;padding:8px 0;border-right:1px solid var(--border)}
.th-stat:last-child{border-right:none}
.th-stat-n{font-size:18px;font-weight:700;color:var(--text)}
.th-stat-n.p{color:var(--azul)}
.th-stat-n.f{color:var(--red)}
.th-stat-l{font-size:9px;color:var(--muted);font-weight:600;text-transform:uppercase;letter-spacing:.5px;margin-top:1px}
.diario-wrap{border:1.5px solid var(--border);border-radius:10px;overflow:hidden;margin-bottom:10px;background:white}
.diario-table{width:100%;border-collapse:collapse;table-layout:fixed}
.diario-table th{background:var(--azul-l);font-size:9px;font-weight:700;color:var(--azul);padding:6px 4px;text-align:center;border-bottom:1.5px solid var(--border);border-right:1px solid var(--border);text-transform:uppercase;letter-spacing:.3px}
.diario-table th:first-child{text-align:left;padding-left:8px}
.diario-table th:last-child{border-right:none}
.diario-table td{border-bottom:1px solid var(--border);border-right:1px solid var(--border);vertical-align:middle;padding:0}
.diario-table td:last-child{border-right:none}
.diario-table tr:last-child td{border-bottom:none}
.nome-cell{padding:7px 8px;font-size:10px;font-weight:500;color:var(--text);line-height:1.3}
.nome-num{font-size:9px;color:var(--muted);margin-right:3px;font-weight:400}
.dia-cell{text-align:center;cursor:pointer;height:34px;-webkit-tap-highlight-color:transparent;user-select:none}
.dia-cell:active{opacity:.7}
.dia-cell.P{background:#E8EDF8}
.dia-cell.F{background:var(--red-l)}
.dia-mark{font-size:11px;font-weight:700}
.dia-cell.P .dia-mark{color:var(--azul)}
.dia-cell.F .dia-mark{color:var(--red)}
.dia-cell.N .dia-mark{color:var(--border)}
.today-col{background:rgba(0,43,127,.04)!important}
.dia-cell.P.today-col{background:#D0DAEF!important}
.dia-cell.F.today-col{background:#FAD4DA!important}
.legenda{display:flex;gap:14px;padding:7px 12px;background:var(--gray);border-top:1px solid var(--border);font-size:9px;color:var(--muted);font-weight:600;text-transform:uppercase;letter-spacing:.4px}
.leg-dot{display:inline-block;width:8px;height:8px;border-radius:50%;margin-right:4px;vertical-align:middle}
.divider-row td{background:var(--azul-l);font-size:9px;font-weight:700;color:var(--azul);padding:4px 8px;border-bottom:1px solid var(--border);text-transform:uppercase;letter-spacing:.4px}
.mes-nav{display:flex;align-items:center;justify-content:space-between;margin-bottom:10px}
.mes-nav button{padding:6px 14px;font-size:12px;font-weight:700;font-family:'Montserrat',sans-serif;border:1.5px solid var(--azul);border-radius:8px;background:white;color:var(--azul);cursor:pointer}
.mes-label{font-size:13px;font-weight:700;color:var(--azul);text-transform:uppercase;letter-spacing:.5px}
.salvar-btn{width:100%;padding:13px;background:var(--azul);color:white;border:none;border-radius:10px;font-size:13px;font-weight:700;font-family:'Montserrat',sans-serif;cursor:pointer;margin-bottom:8px;letter-spacing:.5px;text-transform:uppercase}
.salvar-btn:active{background:var(--azul-h)}
.toast{background:var(--azul-l);color:var(--azul);border:1.5px solid var(--azul);border-radius:8px;padding:9px 14px;text-align:center;font-size:12px;font-weight:600;margin-bottom:8px;display:none}
.sem-aula{text-align:center;padding:24px;color:var(--muted);font-size:12px;font-weight:500;background:white;border-radius:10px;border:1.5px solid var(--border)}
.sync-status{background:white;border:1.5px solid var(--border);border-radius:8px;padding:8px 12px;margin-bottom:10px;font-size:11px;color:var(--muted);display:flex;align-items:center;gap:8px}
.sync-dot{width:8px;height:8px;border-radius:50%;background:#ccc;flex-shrink:0}
.sync-dot.ok{background:#1D9E75}
.sync-dot.err{background:var(--red)}

</style>
</head>
<body>

<div class="app">
<div class="brand-bar">
  <div class="brand-logo">M</div>
  <div>
    <div class="brand-title">Diário de Frequência</div>
    <div class="brand-sub">Colégio Marista · Professor</div>
  </div>
  <div class="sync-badge" id="sync-badge">Offline</div>
</div>

<div class="sync-status" id="sync-status">
  <div class="sync-dot" id="sync-dot"></div>
  <span id="sync-text">Verificando sincronização...</span>
</div>

<select id="mod-sel" onchange="onMod()"><option value="">Selecione a modalidade...</option></select>
<select id="turma-sel" onchange="onTurma()" style="display:none"><option value="">Selecione a turma...</option></select>
<div id="mes-nav" style="display:none" class="mes-nav">
  <button onclick="mudaMes(-1)">&#8592;</button>
  <span class="mes-label" id="mes-label"></span>
  <button onclick="mudaMes(1)">&#8594;</button>
</div>
<div id="turma-header"></div>
<div id="diario-area"></div>

<div id="alert-panel" class="alert-panel">
  <div class="alert-panel-head">
    <span>⚠</span>
    <span>Sinalizar ocorrência</span>
  </div>
  <div class="alert-panel-body">
    <div class="alert-btn-row">
      <button class="alert-btn visitante" onclick="openSignal('visitante')">
        <span>👤</span> Aluno visitante
      </button>
      <button class="alert-btn faltando" onclick="openSignal('faltando')">
        <span>❓</span> Aluno faltando da lista
      </button>
    </div>
  </div>
</div>

<div id="signal-modal-bg" class="signal-modal-bg" style="display:none" onclick="closeSignal(event)">
  <div class="signal-modal" id="signal-modal" onclick="event.stopPropagation()"></div>
</div>
<div id="toast" class="toast"></div>
<button id="salvar-btn" class="salvar-btn" style="display:none" onclick="salvar()">Salvar frequência</button>
</div>

const USERS_KEY = 'mger_users_v1';
let currentUser = null;

function getUsers() {
  try {
    const r = localStorage.getItem(USERS_KEY);
    if (r) {
      const parsed = JSON.parse(r);
      if (Object.keys(parsed).length > 0) return parsed;
    }
  } catch(e) {}
  // Fallback: demo user only if nothing stored yet
  return { demo: { senha: 'demo123', temp: false, ativo: true, nome: 'Demo', turmas: [] } };
}

function saveUsers(users) {
  try { localStorage.setItem(USERS_KEY, JSON.stringify(users)); } catch(e) {}
}

async function loadUsers() {
  if (!SHEET_URL) return;
  try {
    const r = await fetch(SHEET_URL + '?action=getUsers&t=' + Date.now());
    if (r.ok) {
      const d = await r.json();
      if (d && d.users && Object.keys(d.users).length > 0) {
        saveUsers(d.users);
      }
    }
  } catch(e) {}
}

function hashSimple(str) {
  let hash = 0;
  for (let i = 0; i < str.length; i++) {
    hash = ((hash << 5) - hash) + str.charCodeAt(i);
    hash |= 0;
  }
  return 'h' + Math.abs(hash).toString(36);
}

// --- SYNC ---
function setSyncStatus(ok,msg){
  document.getElementById('sync-dot').className='sync-dot '+(ok?'ok':'err');
  document.getElementById('sync-text').textContent=msg;
  document.getElementById('sync-badge').textContent=ok?'Online':'Offline';
}

async function syncToSheet(payload){
  if(!SHEET_URL){setSyncStatus(false,'Sincronização não configurada');return false;}
  try{
    const r=await fetch(SHEET_URL,{method:'POST',body:JSON.stringify(payload)});
    if(r.ok){setSyncStatus(true,'Salvo e sincronizado — '+new Date().toLocaleTimeString('pt-BR',{hour:'2-digit',minute:'2-digit'}));return true;}
    setSyncStatus(false,'Erro ao sincronizar');return false;
  }catch(e){setSyncStatus(false,'Sem conexão — salvo localmente');return false;}
}

// CARREGAR TURMAS E ALUNOS DO SHEETS (atualização dinâmica)

async function loadTurmasFromSheet(){
  if(!SHEET_URL) return;
  try{
    const r=await fetch(SHEET_URL+'?action=getAlunos&t='+Date.now());
    if(!r.ok) return;
    const text=await r.text();
    const data=JSON.parse(text);
    if(data&&data.alunos&&data.alunos.length>0){
      // Convert alunos list into TURMAS structure
      const turmasMap={};
      // Build a lookup from embedded TURMAS for dias/horario fallback
      const turmasEmbedded={};
      TURMAS.forEach(t=>{turmasEmbedded[t.turma]=t;});
      data.alunos.forEach(a=>{
        if(a.status==='Inativo') return;
        const key=a.turma||'SEM_TURMA';
        if(!turmasMap[key]){
          // Use dias/horario from aluno, fallback to embedded TURMAS, fallback to weekdays
          const embedded=turmasEmbedded[key]||{};
          const dias=a.dias&&a.dias.length?a.dias:(embedded.dias&&embedded.dias.length?embedded.dias:[]);
          const horario=a.horario||embedded.horario||'';
          turmasMap[key]={
            nome_modalidade: a.modalidade||embedded.nome_modalidade||key,
            turma: key,
            monitor: embedded.monitor||'',
            dias: dias,
            horario: horario,
            alunos: []
          };
        }
        if(a.nome&&!turmasMap[key].alunos.includes(a.nome)){
          turmasMap[key].alunos.push(a.nome);
        }
      });
      const novasTurmas=Object.values(turmasMap).filter(t=>t.alunos.length>0);
      if(novasTurmas.length>0){
        // Sort alunos alphabetically
        novasTurmas.forEach(t=>t.alunos.sort());
        TURMAS=novasTurmas;
        populateSelects();
        // Re-render if turma already selected
        if(typeof curTurma!=='undefined'&&curTurma){
          const updated=TURMAS.find(t=>t.turma===curTurma.turma);
          if(updated){curTurma=updated;renderDiario();}
        }
        console.log('Turmas atualizadas do servidor:',TURMAS.length);
      }
    }
  }catch(e){
    console.log('Usando turmas locais (fallback):',e.message);
  }
}

async function loadFromSheet(){
  if(!SHEET_URL){setSyncStatus(false,'Modo offline — configure SHEET_URL');return;}
  setSyncStatus(false,'Conectando...');
  try{
    const r=await fetch(SHEET_URL+'?action=get&t='+Date.now());
    if(r.ok){
      const text=await r.text();
      try{
        const data=JSON.parse(text);
        if(data&&typeof data==='object'&&!data.error){
          Object.assign(ST,data);saveSt();
          setSyncStatus(true,'Sincronizado — '+new Date().toLocaleTimeString('pt-BR',{hour:'2-digit',minute:'2-digit'}));
          if(curTurma)renderDiario();
        }else{
          setSyncStatus(false,'Erro na resposta do servidor');
        }
      }catch(je){setSyncStatus(false,'Resposta inválida do servidor');}
    }else{
      setSyncStatus(false,'Erro HTTP '+r.status);
    }
  }catch(e){
    setSyncStatus(false,'Sem conexão — dados locais em uso');
  }
}

// --- DATA ---
function diasDoMes(ano,mes,dias){
  // If dias is empty, default to all weekdays (Mon-Fri) for Estendido/Integral
  const diasFinal=(dias&&dias.length)?dias:['seg','ter','qua','qui','sex'];
  const r=[],d=new Date(ano,mes,1),m={0:'dom',1:'seg',2:'ter',3:'qua',4:'qui',5:'sex',6:'sab'};
  while(d.getMonth()===mes){if(diasFinal.includes(m[d.getDay()]))r.push(new Date(d));d.setDate(d.getDate()+1);}return r;
}
function fmtDate(d){return d.toISOString().slice(0,10);}
function fmtDM(d){return String(d.getDate()).padStart(2,'0')+'/'+String(d.getMonth()+1).padStart(2,'0');}
function isToday(d){return fmtDate(d)===fmtDate(new Date());}
function getKey(t,dt,a){return t+'|'+dt+'|'+a;}

  const mods=[...new Set(TURMAS.map(t=>t.nome_modalidade))].sort();
  const ms=document.getElementById('mod-sel');
  ms.innerHTML='<option value="">Selecione a modalidade...</option>';
  mods.forEach(m=>{const o=document.createElement('option');o.value=m;o.textContent=m;ms.appendChild(o);});
}
populateSelects();

function onTurma(){
  const tid=document.getElementById('turma-sel').value;
  if(!tid){['turma-header','diario-area'].forEach(id=>document.getElementById(id).innerHTML='');document.getElementById('salvar-btn').style.display='none';document.getElementById('mes-nav').style.display='none';document.getElementById('alert-panel').classList.remove('visible');return;}
  curTurma=TURMAS.find(t=>t.turma===tid);
  viewMes=new Date();
  document.getElementById('mes-nav').style.display='flex';
  renderML();renderDiario();
}

function renderML(){document.getElementById('mes-label').textContent=MESES[viewMes.getMonth()].toUpperCase()+' '+viewMes.getFullYear();}
function mudaMes(d){viewMes=new Date(viewMes.getFullYear(),viewMes.getMonth()+d,1);renderML();renderDiario();}

function renderDiario(){
  const t=curTurma;if(!t)return;
  const ano=viewMes.getFullYear(),mes=viewMes.getMonth();
  const aulas=diasDoMes(ano,mes,t.dias);
  const diasStr=t.dias.map(d=>DIAS_NOME[d]).join(', ');
  document.getElementById('turma-header').innerHTML=`
    <div class="turma-header">
      <div class="th-top">
        <div class="th-nome">${t.nome_modalidade}${t.isUnificado?'':' — '+t.turma}</div>
        <div class="th-meta">${diasStr} &nbsp;|&nbsp; ${t.horario} &nbsp;|&nbsp; ${t.monitor}</div>
        ${t.isUnificado?'<span style="display:inline-block;background:#E31837;color:white;font-size:9px;font-weight:700;padding:2px 7px;border-radius:4px;margin-top:5px;text-transform:uppercase">Turma Unificada</span>':''}
      </div>
      <div class="th-stats" id="th-stats"></div>
    </div>`;
  if(!aulas.length){document.getElementById('diario-area').innerHTML='<div class="sem-aula">Sem aulas neste mês para esta turma.</div>';document.getElementById('salvar-btn').style.display='none';return;}
  const maxC=5,chunks=[];
  for(let i=0;i<aulas.length;i+=maxC)chunks.push(aulas.slice(i,i+maxC));
  let html='';let cellIndex=0;cellMap={};
  chunks.forEach((chunk,ci)=>{
    html+=`<div class="diario-wrap"><table class="diario-table"><thead><tr><th style="width:105px">Aluno</th>`;
    chunk.forEach(d=>{
      const tod=isToday(d)?'today-col':'';
      const dw=['Dom','Seg','Ter','Qua','Qui','Sex','Sáb'][d.getDay()];
      html+=`<th class="${tod}">${dw}<br>${fmtDM(d)}</th>`;
    });
    html+=`</tr></thead><tbody>`;
    if(t.isUnificado){
      t.grupos.forEach((g)=>{
        html+=`<tr class="divider-row"><td colspan="${chunk.length+1}">${g.label}</td></tr>`;
        g.alunos.forEach((a,ai)=>{
          html+=`<tr><td class="nome-cell"><span class="nome-num">${ai+1}.</span>${a.split(' ').slice(0,2).join(' ')}</td>`;
          chunk.forEach(d=>{const dk=fmtDate(d),k=getKey(t.turma,dk,a),v=ST[k]||'N',tod=isToday(d)?'today-col':'';const idx=cellIndex++;html+=`<td class="dia-cell ${v} ${tod}" data-idx="${idx}" onclick="toggle(this)"><span class="dia-mark">${v==='P'?'P':v==='F'?'F':'-'}</span></td>`;cellMap[idx]={turma:t.turma,data:dk,aluno:a};});
          html+=`</tr>`;
        });
      });
    }else{
      t.alunos.forEach((a,ai)=>{
        html+=`<tr><td class="nome-cell"><span class="nome-num">${ai+1}.</span>${a.split(' ').slice(0,2).join(' ')}</td>`;
        chunk.forEach(d=>{const dk=fmtDate(d),k=getKey(t.turma,dk,a),v=ST[k]||'N',tod=isToday(d)?'today-col':'';const idx=cellIndex++;html+=`<td class="dia-cell ${v} ${tod}" data-idx="${idx}" onclick="toggle(this)"><span class="dia-mark">${v==='P'?'P':v==='F'?'F':'-'}</span></td>`;cellMap[idx]={turma:t.turma,data:dk,aluno:a};});
        html+=`</tr>`;
      });
    }
    html+=`</tbody></table>`;
    if(ci===chunks.length-1)html+=`<div class="legenda"><span><span class="leg-dot" style="background:#002B7F"></span>P — Presente</span><span><span class="leg-dot" style="background:#E31837"></span>F — Falta</span><span>Toque para alternar</span></div>`;
    html+=`</div>`;
  });
  document.getElementById('diario-area').innerHTML=html;
  document.getElementById('salvar-btn').style.display='block';
  document.getElementById('alert-panel').classList.add('visible');
  updateStats(t,aulas);
}

function toggle(cell){
  const idx=parseInt(cell.getAttribute('data-idx'));
  const info=cellMap[idx];
  if(!info)return;
  const k=getKey(info.turma,info.data,info.aluno);
  const cur=ST[k]||'N';
  const next=cur==='N'?'P':cur==='P'?'F':'N';
  ST[k]=next;
  const tod=cell.classList.contains('today-col');
  cell.className='dia-cell '+next+(tod?' today-col':'');
  const mark=cell.querySelector('.dia-mark');
  if(mark)mark.textContent=next==='P'?'P':next==='F'?'F':'-';
  const t=TURMAS.find(x=>x.turma===info.turma);
  if(t)updateStats(t,diasDoMes(viewMes.getFullYear(),viewMes.getMonth(),t.dias));
}
function updateStats(t,aulas){
  let p=0,f=0,n=0;
  aulas.forEach(d=>{const dk=fmtDate(d);t.alunos.forEach(a=>{const v=ST[getKey(t.turma,dk,a)]||'N';if(v==='P')p++;else if(v==='F')f++;else n++;});});
  const el=document.getElementById('th-stats');
  if(el)el.innerHTML=`<div class="th-stat"><div class="th-stat-n p">${p}</div><div class="th-stat-l">Presenças</div></div><div class="th-stat"><div class="th-stat-n f">${f}</div><div class="th-stat-l">Faltas</div></div><div class="th-stat"><div class="th-stat-n">${n}</div><div class="th-stat-l">Não marcados</div></div>`;
}

  const titulo = isVisitante ? 'Aluno visitante na turma' : 'Aluno faltando da lista';
  const descPlaceholder = isVisitante
    ? 'Nome do aluno visitante...'
    : 'Nome do aluno que deveria estar na lista...';
  const obs = isVisitante
    ? 'Informe o nome do aluno que está presente mas não consta na lista da turma.'
    : 'Informe o nome do aluno que está na lista mas não apareceu e você não conseguiu identificar o motivo.';

  box.innerHTML = `
    <div class="signal-modal-head ${colorClass}">
      <h3>${titulo}</h3>
      <button class="signal-modal-close" onclick="closeSignal()">×</button>
    </div>
    <div class="signal-modal-body">
      <div style="font-size:11px;color:#5A6480;margin-bottom:12px;line-height:1.5">${obs}</div>
      <label class="signal-label">Turma atual (onde está presente)</label>
      <div style="font-size:12px;font-weight:600;color:#002B7F;margin-bottom:12px;background:#E8EDF8;padding:8px 10px;border-radius:6px">${t.nome_modalidade} — ${t.turma}</div>
      <label class="signal-label">Nome do aluno</label>
      <input class="signal-input" id="sig-nome" placeholder="${descPlaceholder}">
      ${isVisitante ? `
      <label class="signal-label">Turma correta do aluno (se souber)</label>
      <input class="signal-input" id="sig-turma-correta" placeholder="Ex: FUTSAL-2ª4ª, Teatro turma da tarde...">
      ` : ''}
      <label class="signal-label">Observação (opcional)</label>
      <input class="signal-input" id="sig-obs" placeholder="Ex: veio com outro professor, não soube informar..." onkeydown="if(event.key==='Enter')submitSignal('${tipo}')">
      <button class="signal-submit ${colorClass}" onclick="submitSignal('${tipo}')">Enviar sinalização</button>
    </div>`;
  document.getElementById('signal-modal-bg').style.display = 'flex';
  setTimeout(() => document.getElementById('sig-nome').focus(), 100);
}

function closeSignal(e) {
  if (!e || e.target === document.getElementById('signal-modal-bg'))
    document.getElementById('signal-modal-bg').style.display = 'none';
}

async function submitSignal(tipo) {
  const nome = (document.getElementById('sig-nome').value || '').trim();
  const obs  = (document.getElementById('sig-obs').value || '').trim();
  const turmaCorretaEl = document.getElementById('sig-turma-correta');
  const turmaCorreta = turmaCorretaEl ? turmaCorretaEl.value.trim() : '';
  if (!nome) { document.getElementById('sig-nome').focus(); return; }

  const t = curTurma;
  const sig = {
    id: Date.now(),
    tipo,
    aluno: nome.toUpperCase(),
    obs,
    turmaCorreta: turmaCorreta || '',
    turma: t.turma,
    modalidade: t.nome_modalidade,
    horario: t.horario,
    professor: 'professor',
    data: fmtDate(new Date()),
    hora: new Date().toLocaleTimeString('pt-BR', { hour: '2-digit', minute: '2-digit' }),
    resolvido: false
  };

  const sigs = loadSignals();
  sigs.push(sig);
  saveSignals(sigs);

  // Sync to sheet
  await syncSignal(sig);

  document.getElementById('signal-modal-bg').style.display = 'none';

  // Show confirmation toast
  const toast = document.getElementById('toast');
  toast.textContent = '✓ Sinalização enviada para a coordenação';
  toast.style.display = 'block';
  setTimeout(() => toast.style.display = 'none', 3000);
}

async function syncSignal(sig) {
  if (!SHEET_URL) return;
  try {
    await fetch(SHEET_URL, {
      method: 'POST',
      body: JSON.stringify({ action: 'saveSignal', signal: sig })
    });
  } catch(e) {}
}
// ============================================================
async function salvar(){
  saveSt();
  const t=curTurma;
  if(!t)return;
  // Build payload for sync
  const ano=viewMes.getFullYear(),mes=viewMes.getMonth();
  const aulas=diasDoMes(ano,mes,t.dias);
  const payload={action:'save',turma:t.turma,modalidade:t.nome_modalidade,mes:MESES[mes],ano,horario:t.horario,monitor:t.monitor,registros:{}};
  aulas.forEach(d=>{
    const dk=fmtDate(d);
    t.alunos.forEach(a=>{payload.registros[getKey(t.turma,dk,a)]=ST[getKey(t.turma,dk,a)]||'N';});
  });
  const ok=await syncToSheet(payload);
  const toast=document.getElementById('toast');
  toast.textContent=ok?'Salvo e sincronizado! '+new Date().toLocaleTimeString('pt-BR',{hour:'2-digit',minute:'2-digit'}):'Salvo localmente. Sincronizará quando houver conexão.';
  toast.style.display='block';
  setTimeout(()=>toast.style.display='none',3000);
}

// Carrega dados da nuvem ao abrir
window.addEventListener('load',()=>{ loadFromSheet(); loadTurmasFromSheet(); });
// Tenta re-sincronizar ao recuperar conexão
window.addEventListener('online',()=>{loadFromSheet();loadTurmasFromSheet();});
// Recarrega turmas quando volta para a aba (professor pode ter ficado na tela)
window.addEventListener('focus',()=>loadTurmasFromSheet());
// Recarrega turmas a cada 5 minutos
setInterval(()=>loadTurmasFromSheet(), 5*60*1000);
</script>
